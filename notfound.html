<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Facebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Navigation Bar */
        .header {
            width: 100%;
            background-color: #fff;
            padding: 10px 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .fb-logo {
            color: #1877f2;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: -1px;
        }

        /* Main Content */
        .content-box {
            margin-top: 100px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            padding: 20px;
        }

        .icon-container {
            margin-bottom: 20px;
        }

        .broken-link-icon {
            width: 112px;
            height: 112px;
            opacity: 0.6;
        }

        .title {
            color: #1c1e21;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .text {
            color: #65676b;
            font-size: 16px;
            line-height: 1.4;
            margin-bottom: 24px;
        }

        /* Buttons and Links */
        .go-back-btn {
            display: inline-block;
            background-color: #1877f2;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .go-back-btn:hover {
            background-color: #166fe5;
        }

        .footer-links {
            margin-top: 24px;
        }

        .help-link {
            display: block;
            margin-top: 12px;
            color: #1877f2;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .help-link:hover {
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .content-box {
                margin-top: 60px;
            }
            .title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="fb-logo">facebook</a>
    </div>

    <div class="content-box">
        <div class="icon-container">
            <span style="font-size: 80px; filter: grayscale(1);">🚫</span>
        </div>
        
        <div class="title">This page isn't available</div>
        
        <div class="text">
            The link you followed may be broken, or the page may have been removed. 
            Check that the URL you're trying to open is correct.
        </div>
        
        <a href="index.html" class="go-back-btn">Go to News Feed</a>
        
        <div class="footer-links">
            <a href="index.html" class="help-link">Go back to previous page</a>
            <a href="https://www.facebook.com/help" class="help-link">Visit Help Centre</a>
        </div>
    </div>

</body>
</html>
